name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Default-feature gate: format, lints, tests, release build. Fast — pulls no
  # heavyweight optional deps (wasmtime / opentelemetry stay behind features).
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # keyring (the vault's OS-keychain backend) links libdbus-1 on Linux.
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets

      - name: Test
        run: cargo test --workspace

      - name: Release build
        run: cargo build --workspace --release

      - name: Example config validates
        env:
          ANTHROPIC_API_KEY: ci-placeholder
          GEMINI_API_KEY: ci-placeholder
          VERTEX_ACCESS_TOKEN: ci-placeholder
          AWS_ACCESS_KEY_ID: ci-placeholder
          AWS_SECRET_ACCESS_KEY: ci-placeholder
        run: cargo run -q -p sb-server -- config validate --config config/switchback.example.yaml

  # Optional features compile (heavyweight deps): the sandboxed Wasm plugin tier
  # and the OpenTelemetry export. Separate job so the main gate stays fast.
  features:
    name: optional features build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # `Server with wasm + otel` builds sb-server, which links keyring/libdbus-1.
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Wasm plugin tier
        run: cargo test -p sb-plugin --features wasm
      - name: Server with wasm + otel
        run: cargo build -p sb-server --features wasm,otel

  # Dependency vulnerability audit. Advisory only (continue-on-error) so a
  # transitive advisory we can't immediately fix surfaces without blocking merges.
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
