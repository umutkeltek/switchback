name: Bug report
description: Something isn't working as documented
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. For **security vulnerabilities, do not file an issue** —
        see [SECURITY.md](../../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
      placeholder: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Ideally a `curl` command and the config (with secrets redacted).
      render: shell
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / trace
      description: Output of the failing request (`curl -i`) and any server logs. Redact secrets.
      render: shell
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: "v0.1.0 or a commit sha"
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: "macOS 15 (arm64) / Linux x86_64 / Docker"
