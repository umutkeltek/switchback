# Native-client starter config: Codex and Claude Code can point at Switchback
# immediately while Switchback owns provider/account credentials.
#
# This file runs with no real API keys. It uses the mock provider for smoke
# tests, then shows the exact provider/account shapes to uncomment when you are
# ready to use real OpenAI/Anthropic accounts.
server:
  bind: "127.0.0.1:8765"

providers:
  - id: mock
    type: mock
    accounts:
      - id: local
        auth: { kind: api_key, inline: "not-a-real-key" }

# Real provider/account examples. Uncomment, set env vars or native OAuth
# sources, then update
# client_profiles.*.accounts and routes.*.targets to point at these accounts
# and provider/model targets.
