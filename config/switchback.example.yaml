# Switchback v1 example config. Copy to switchback.yaml (git-ignored) and add real keys.
server:
  bind: "127.0.0.1:8765"
  # Optional: require this key on inbound /v1 requests (Authorization: Bearer ...).
  # api_key: "sk-switchback-local"
  # RTK tool-result compression: shrink bulky tool outputs (git diffs, grep,
  # find, build logs) in the prompt before dispatch. Fail-safe (never grows).
  # compress_tool_results: true

# Optional encrypted credential vault. Secrets live in an age-encrypted file;
# the key lives in the OS keychain (or SWITCHBACK_VAULT_KEY for headless/CI).
#   switchback vault init                    # keychain key + empty vault file
#   switchback vault set openrouter_key      # value via --value or stdin
#   switchback vault keygen                  # mint a key for SWITCHBACK_VAULT_KEY
# An account may then reference a secret by name (auth.vault); it wins over
# env/inline. (Note: the path must be absolute — `~` is NOT expanded.)
# vault:
#   path: "/Users/you/.config/switchback/vault.age"
#   keychain_service: "switchback"

providers:
  # The mock adapter needs no credentials — it proves the pipeline end-to-end.
  - id: mock
    type: mock

  # Any OpenAI-compatible endpoint: OpenAI, OpenRouter, Ollama, vLLM, NIM, Groq, ...
  - id: openrouter
    type: openai_compatible
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"   # read from this env var; never written to logs
    # selection: round_robin
    # sticky: 3
    # accounts:
    #   - id: vaulted              # most secure: pull the key from the vault
    #     auth: { kind: api_key, vault: openrouter_key }
    #     priority: 0
    #     policy_tags: ["prod"]
    #   - id: primary-api-key
    #     auth: { kind: api_key, env: OPENROUTER_API_KEY }
    #     priority: 1
    #   - id: backup-oauth
    #     auth: { kind: oauth, token_env: OPENROUTER_OAUTH_TOKEN }
    #     priority: 2
    #     policy_tags: ["interactive"]

  - id: ollama
    type: openai_compatible
    base_url: "http://localhost:11434/v1"
    # no auth for local Ollama

  # Anthropic Messages API (/v1/messages) — its own wire format, not OpenAI.
  # base_url defaults to https://api.anthropic.com; auth is x-api-key.
  - id: anthropic
    type: anthropic
    api_key_env: "ANTHROPIC_API_KEY"   # read from env; never written to logs
    # base_url: "https://api.anthropic.com"   # default; override for a proxy

  # Google Gemini (GenerateContent) — x-goog-api-key auth, model in the URL path.
  - id: gemini
    type: gemini
    api_key_env: "GEMINI_API_KEY"
    # base_url: "https://generativelanguage.googleapis.com"   # default

routes:
  # A route matches inbound requests and defines an ordered candidate list.
  # A request's `model` field is "provider/model" (e.g. "mock/echo",
  # "openrouter/anthropic/claude-3.5-sonnet"); if it names a route, the
  # route's targets are used as the primary + fallback chain.
  - name: default
    match:
      model: "*"
    targets:
      - "mock/echo"
      # - "openrouter/openai/gpt-4o-mini"
      # - "ollama/qwen2.5-coder"

  - name: coding
    match:
      model: "coding"          # client can request model: "coding"
    require:
      streaming: true
    targets:
      # Direct Anthropic first, then cross-provider fallback (openrouter, ollama).
      - "anthropic/claude-3-5-sonnet-latest"
      - "openrouter/openai/gpt-4o"
      - "ollama/qwen2.5-coder"

# Optional typed catalog (§13.3 seams). Distinct provider/model/account/
# credential/price entities, each with a tenant scope (always 1 today) and
# FK-by-id references; price is a ledger with history. v1 carries + validates
# it (`switchback doctor`) — the hot path still runs off providers/routes above.
# catalog:
#   providers:
#     - { id: anthropic, name: Anthropic, api_kind: anthropic, base_url: "https://api.anthropic.com" }
#   models:
#     - { id: claude-3-5-sonnet-latest, provider_id: anthropic, context_window: 200000,
#         modalities: [text_in, text_out, vision_in] }
#   accounts:
#     - { id: anthropic-personal, provider_id: anthropic, owner_id: umut }
#   credentials:
#     - { id: cred-1, account_id: anthropic-personal, kind: api_key, source_ref: anthropic_key }
#   prices:   # micro-USD per million tokens; effective_from/to = ledger history
#     - { model_id: claude-3-5-sonnet-latest, token_kind: input,
#         unit_price_micros_per_mtok: 3000000, effective_from: "2025-01-01T00:00:00Z" }
