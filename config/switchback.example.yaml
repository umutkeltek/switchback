# Switchback v1 example config. Copy to switchback.yaml (git-ignored) and add real keys.
server:
  bind: "127.0.0.1:8765"
  # Loopback can run open for local development. If you bind to 0.0.0.0 / ::,
  # configure api_key/api_keys or explicitly opt into an open admin gateway.
  # allow_open_admin: false
  # Optional: require this key on inbound /v1 requests (Authorization: Bearer ...).
  # api_key: "sk-switchback-local"
  # RTK tool-result compression: shrink bulky tool outputs (git diffs, grep,
  # find, build logs) in the prompt before dispatch. Fail-safe (never grows).
  # compress_tool_results: true
  # Append the usage/cost ledger to a JSONL audit trail (the in-memory ledger +
  # GET /v1/usage summary work regardless). Costs are priced from `catalog:`.
  # usage_log: "/Users/you/.config/switchback/usage.jsonl"
  # End-to-end tracing: one metadata-only record per request (route decision +
  # every account/egress attempt + cost), exposed at GET /v1/traces and
  # /v1/traces/{id}, with x-switchback-request-id on every response. The
  # in-memory ring works regardless; set trace_log to also append JSONL.
  # trace_log: "/Users/you/.config/switchback/traces.jsonl"
  # trace_ring_size: 256   # how many recent traces /v1/traces keeps in memory
  # Admission control (opt-in): a global cap on in-flight requests. Bursts queue
  # up to admission_timeout_ms (then 503 — load shed); the wait is reported in the
  # x-switchback-queue-ms header. max_response_bytes caps the non-streaming
  # collect path so a huge upstream response is aborted, not buffered unbounded.
  # max_concurrency: 256
  # admission_timeout_ms: 10000
  # max_response_bytes: 8388608   # 8 MiB
  # privacy_mode: metadata_only   # the default + only enforced mode (logs/traces
  #                               # are metadata, never prompt/response content)
  # Reject high-lossiness Gemini/Vertex JSON-Schema downlevels instead of
  # warning and dispatching. Default false preserves compatibility.
  # strict_schema_downlevel: false
  # Durable state (opt-in): a SQLite file recording every published config
  # revision, audit row, usage event, idempotency in-flight claim, and tenant
  # concurrency slot. Revisions/audit/usage are metadata only. Durable `/cp/v1`
  # drafts persist proposed config bodies; keep the DB protected like config if
  # you enable them. Unset = in-memory only.
  # Use `required: true` when startup must fail instead of silently degrading to
  # memory if the store cannot be opened; required stores also make non-streaming
  # usage persistence and budget reads fail closed.
  # state_store:
  #   path: "/Users/you/.config/switchback/state.sqlite"
  #   required: false
  # idempotency:
  #   inflight_ttl_ms: 600000            # abandoned durable claims expire
  #   persist_response_bodies: false     # true stores non-streaming responses
  # tenant_concurrency_ttl_ms: 600000    # abandoned durable tenant slots expire
# Multi-tenancy (opt-in): map API keys to tenants for usage attribution + quotas.
# When `api_keys` is set it's the authoritative key list (unknown key → 401);
# leave both unset to keep `server.api_key`'s single-key behaviour. Do not set
# both `server.api_key` and `api_keys`. Prefer `key_env` or `key_hash` over an
# inline `key` if configs/drafts may be stored durably. Hard limits reject before
# upstream dispatch: budget_usd → 402, max_concurrency → 429. With state_store,
# tenant concurrency and spend checks coordinate through durable state; otherwise
# tenant concurrency is process-local.
# tenants:
#   - id: acme
#     allowed_routes: ["default"]       # optional route allow-list
#     allowed_providers: ["mock"]       # optional provider allow-list
#     allowed_accounts: ["mock/team"]   # optional provider/account credential scope
#     budget_usd: 100.0      # cumulative attributed spend cap (USD)
#     max_concurrency: 8     # simultaneous in-flight requests
# api_keys:
#   - key_env: SWITCHBACK_ACME_KEY
#     tenant: acme
#     project: web           # optional attribution label
#   - key_hash: "sha256:<64 lowercase hex chars>"
#     prefix: "sk-acme-"     # display-only label, never used for auth
#     tenant: acme
# Built-in plugins (opt-in), compiled into the snapshot and run on the hot path.
# model_blocklist rejects with 403; request_tag injects metadata; egress_pin pins
# matching models to a named egress path. Active chain at GET /v1/plugins.
# plugins:
#   - type: model_blocklist
#     models: ["expensive/*", "legacy/model"]   # exact or prefix*
#   - type: request_tag
#     tags: { source: gateway }
#   - type: egress_pin
#     egress: proxy-eu
#     models: ["anthropic/*"]
#   - type: wasm                         # tier 2: requires building --features wasm
#     path: "/path/to/plugin.wasm"       # guest exports memory + alloc + pre_route
#     failure_mode: open                 # open = warn/no-op on activation failure; closed = reject config
#     timeout_ms: 10                     # wall-clock epoch interruption deadline
#     fuel: 1000000
  # trace_sample: 1.0      # fraction of requests to trace (0.0–1.0); a request
  #                        # is fully traced or not, decided by a stable id hash.
  #                        # Logs/spans still emit regardless. Each request opens
  #                        # a `switchback.request` span with child
  #                        # `switchback.attempt` spans (OpenTelemetry-ready).
  # Export those spans to an OTLP/HTTP collector (Jaeger/Tempo/Grafana Alloy/…).
  # Requires building with the `otel` feature: cargo run -p sb-server --features otel.
  # The endpoint is the full traces URL.
  # otel_endpoint: "http://localhost:4318/v1/traces"
  # Pass-through: any model that matches no route and isn't a configured
  # `provider/model` is forwarded VERBATIM to this provider. Point it at
  # openrouter and every model it serves works with no per-model config and no
  # rebuild — adding a model is a runtime/data concern, not a code change.
  # default_provider: "openrouter"
  # Cost-aware routing: when on, the router re-orders a route's surviving
  # candidates cheapest-first by blended (input+output) price from the cost map,
  # instead of the declared fallback order. Off by default (declared order). Point
  # cost_map at the price registry; cost_max_per_mtok caps eligibility even when
  # cost-aware ordering is off. Unknown prices follow `cost_unknown`.
  # cost_aware: true
  # cost_map: "config/provider-registry.json"
  # cost_max_per_mtok: 50.0
  # Cost-routing policy gates (all default-allow): set false to exclude a lane
  # from routing. free = free tiers / price 0; promo = time-boxed promo prices;
  # aggregator = third-party open-weight hosts (vs first-party).
  # cost_allow_free: true
  # cost_allow_promo: true
  # cost_allow_aggregator: true
  # cost_unknown: allow      # allow | penalize | reject
  # context_unknown: allow   # allow | reject
  # Latency-aware routing: order candidates fastest-first by an EWMA of observed
  # upstream latency (cold/never-measured targets are explored first, then settle
  # into the ranking). cost_aware wins when both are on.
  # latency_aware: true
  # --- Resilience (all off by default) ---
  # Retry a transient failure (timeout/network/5xx) on the SAME account before
  # falling over, with capped exponential backoff.
  # retry: { max_retries: 2, base_delay_ms: 100, max_delay_ms: 2000 }
  # Circuit breaker: after N consecutive failures across a provider's accounts,
  # OPEN it (skip its targets) for open_secs, then half-open to probe recovery.
  # circuit_breaker: { enabled: true, failure_threshold: 5, open_secs: 30 }
  # Spend caps from the usage ledger: a hard global ceiling (reject with 402) and
  # per-provider caps (route around a provider that hit its cap).
  # budget: { max_usd: 50.0, per_provider_usd: { openrouter: 20.0 } }
  # Request hedging (non-streaming): race the top candidates, take the first
  # success, cancel the losers (the n-th starts after n*delay_ms).
  # hedge: { enabled: true, delay_ms: 150, max_parallel: 2 }
  # Egress: default outbound path when an account/provider names none, and a
  # master kill-switch that forces every call `direct` regardless of bindings.
  # default_egress: "direct"
  # egress_enabled: true

# Named outbound network paths. An account (or provider) can route its upstream
# calls through a proxy so different accounts call "from different places" — e.g.
# two NVIDIA / OpenRouter accounts on separate egress IPs. This is network-path
# selection only (HTTP(S)/SOCKS5 proxy); `direct` (no proxy) is always implicit.
# Toggle one off with `enabled: false` and its users fall back to direct — no
# need to edit every account. The trace (GET /v1/traces) records the egress each
# attempt actually used. Prefer `url_env` for proxy creds over inline `url`.
# An egress may also carry a client identity: a custom User-Agent + headers
# applied to requests on that path (e.g. an app id).
# egress:
#   - id: nvidia-proxy
#     kind: proxy
#     url_env: NVIDIA_PROXY_URL          # e.g. socks5://user:pass@host:1080
#     user_agent: "MyAgent/1.0"          # optional client identity for this path
#     headers:
#       x-app-id: "my-app"
#   - id: residential-eu
#     kind: proxy
#     url: "http://eu-gw.example:8080"
#     enabled: false                     # toggled off → users fall back to direct

# Optional encrypted credential vault. Secrets live in an age-encrypted file;
# the key lives in the OS keychain (or SWITCHBACK_VAULT_KEY for headless/CI).
#   switchback vault init                    # keychain key + empty vault file
#   switchback vault set openrouter_key      # value via --value or stdin
#   switchback vault keygen                  # mint a key for SWITCHBACK_VAULT_KEY
# An account may then reference a secret by name (auth.vault); it wins over
# env/inline. (Note: the path must be absolute — `~` is NOT expanded.)
# vault:
#   path: "/Users/you/.config/switchback/vault.age"
#   keychain_service: "switchback"

providers:
  # The mock adapter needs no credentials — it proves the pipeline end-to-end.
  - id: mock
    type: mock

  # Any OpenAI-compatible endpoint: OpenAI, OpenRouter, Ollama, vLLM, NIM, Groq, ...
  - id: openrouter
    type: openai_compatible
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"   # read from this env var; never written to logs
    # auth_scheme defaults to `bearer`. For an OpenAI-shaped endpoint that uses a
    # different scheme, declare it as data (no new adapter):
    #   auth_scheme: { kind: header, name: x-api-key }
    #   auth_scheme: { kind: query,  name: key }
    # selection: round_robin
    # sticky: 3
    # accounts:
    #   - id: vaulted              # most secure: pull the key from the vault
    #     auth: { kind: api_key, vault: openrouter_key }
    #     priority: 0
    #     policy_tags: ["prod"]
    #   - id: primary-api-key
    #     auth: { kind: api_key, env: OPENROUTER_API_KEY }
    #     priority: 1
    #     egress: nvidia-proxy       # this account exits via the named egress;
    #                                # another account can omit it and go direct
    #   - id: backup-oauth
    #     # Live refresh: with refresh_* + token_url the access token is minted/
    #     # refreshed automatically before each request (one refresh per account
    #     # even under concurrent load). Use refresh_vault to persist rotated
    #     # refresh tokens atomically back into the encrypted vault; env/inline
    #     # refresh tokens are followed in memory only.
    #     auth:
    #       kind: oauth
    #       refresh_vault: openrouter_oauth_refresh
    #       token_url: "https://oauth.example.com/token"
    #       client_id: "my-client-id"
    #       client_secret_vault: openrouter_oauth_client_secret
    #     priority: 2
    #     policy_tags: ["interactive"]

  - id: ollama
    type: openai_compatible
    base_url: "http://localhost:11434/v1"
    # no auth for local Ollama

  # Anthropic Messages API (/v1/messages) — its own wire format, not OpenAI.
  # base_url defaults to https://api.anthropic.com; auth is x-api-key.
  - id: anthropic
    type: anthropic
    api_key_env: "ANTHROPIC_API_KEY"   # read from env; never written to logs
    # base_url: "https://api.anthropic.com"   # default; override for a proxy

  # Google Gemini (GenerateContent) — x-goog-api-key auth, model in the URL path.
  - id: gemini
    type: gemini
    api_key_env: "GEMINI_API_KEY"
    # base_url: "https://generativelanguage.googleapis.com"   # default

  # AWS Bedrock — the Anthropic (Claude) wire on Bedrock's runtime endpoint,
  # SigV4-signed through the selected account lease, streamed as the binary
  # event-stream framing. The model id is the Bedrock model id.
  - id: bedrock
    type: bedrock
    region: "us-east-1"
    # With no accounts block, a default account is synthesized from these envs.
    # access_key_env / secret_key_env default to AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
    # session_token_env: "AWS_SESSION_TOKEN"   # for temporary STS credentials
    # accounts:
    #   - id: team-aws
    #     auth: { kind: aws_sig_v4, access_key_env: AWS_ACCESS_KEY_ID, secret_key_env: AWS_SECRET_ACCESS_KEY }
    # base_url defaults to https://bedrock-runtime.{region}.amazonaws.com
    # route target: "bedrock/anthropic.claude-3-5-sonnet-20240620-v1:0"

  # Google Vertex AI — the Gemini wire on GCP's project endpoint, Bearer-token
  # auth (e.g. `gcloud auth print-access-token`). A codec + auth, no new adapter.
  - id: vertex
    type: vertex
    project: "my-gcp-project"
    region: "us-central1"
    api_key_env: "VERTEX_ACCESS_TOKEN"
    # base_url defaults to https://{region}-aiplatform.googleapis.com
    # Instead of a static token, use a service-account key — the access token is
    # minted from it (JWT-bearer grant) and refreshed automatically before expiry:
    # accounts:
    #   - id: sa
    #     auth:
    #       kind: service_account
    #       key_file: "/path/to/service-account.json"   # or key_env: GCP_SA_JSON
    #       # scope defaults to https://www.googleapis.com/auth/cloud-platform

# Simple combo UX: a named local model contract compiles into the same route
# planner as `routes:`. Use this when you just want "these models, in this
# order" without writing a full route profile. `fallback` preserves order;
# `round_robin` rotates the candidate order per request.
# combos:
#   coder:
#     strategy: fallback
#     models:
#       - "anthropic/claude-3-5-sonnet-latest"
#       - "openrouter/openai/gpt-4o"
#       - "ollama/qwen2.5-coder"
#   cheap-lab:
#     strategy: round_robin
#     models:
#       - "openrouter/deepseek/deepseek-chat"
#       - "ollama/qwen2.5"

routes:
  # A route matches inbound requests and defines an ordered candidate list.
  # A request's `model` field is "provider/model" (e.g. "mock/echo",
  # "openrouter/anthropic/claude-3.5-sonnet"); if it names a route, the
  # route's targets are used as the primary + fallback chain.
  - name: default
    match:
      model: "*"
    targets:
      - "mock/echo"
      # - "openrouter/openai/gpt-4o-mini"
      # - "ollama/qwen2.5-coder"

  - name: coding
    match:
      model: "coding"          # client can request model: "coding"
    require:
      streaming: true
    targets:
      # Direct Anthropic first, then cross-provider fallback (openrouter, ollama).
      - "anthropic/claude-3-5-sonnet-latest"
      - "openrouter/openai/gpt-4o"
      - "ollama/qwen2.5-coder"

# Optional typed catalog (§13.3 seams). Distinct provider/model/account/
# credential/price entities, each with a tenant scope (always 1 today) and
# FK-by-id references; price is a ledger with history. v1 carries + validates
# it (`switchback doctor`) — the hot path still runs off providers/routes above.
# catalog:
#   providers:
#     - { id: anthropic, name: Anthropic, api_kind: anthropic, base_url: "https://api.anthropic.com" }
#   models:
#     - { id: claude-3-5-sonnet-latest, provider_id: anthropic, context_window: 200000,
#         modalities: [text_in, text_out, vision_in] }
#   accounts:
#     - { id: anthropic-personal, provider_id: anthropic, owner_id: umut }
#   credentials:
#     - { id: cred-1, account_id: anthropic-personal, kind: api_key, source_ref: anthropic_key }
#   prices:   # micro-USD per million tokens; effective_from/to = ledger history
#     - { model_id: claude-3-5-sonnet-latest, token_kind: input,
#         unit_price_micros_per_mtok: 3000000, effective_from: "2025-01-01T00:00:00Z" }
