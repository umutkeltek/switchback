# Switchback v1 example config. Copy to switchback.yaml (git-ignored) and add real keys.
server:
  bind: "127.0.0.1:8765"
  # Optional: require this key on inbound /v1 requests (Authorization: Bearer ...).
  # api_key: "sk-switchback-local"
  # RTK tool-result compression: shrink bulky tool outputs (git diffs, grep,
  # find, build logs) in the prompt before dispatch. Fail-safe (never grows).
  # compress_tool_results: true
  # Append the usage/cost ledger to a JSONL audit trail (the in-memory ledger +
  # GET /v1/usage summary work regardless). Costs are priced from `catalog:`.
  # usage_log: "/Users/you/.config/switchback/usage.jsonl"
  # End-to-end tracing: one metadata-only record per request (route decision +
  # every account/egress attempt + cost), exposed at GET /v1/traces and
  # /v1/traces/{id}, with x-switchback-request-id on every response. The
  # in-memory ring works regardless; set trace_log to also append JSONL.
  # trace_log: "/Users/you/.config/switchback/traces.jsonl"
  # trace_ring_size: 256   # how many recent traces /v1/traces keeps in memory
  # Pass-through: any model that matches no route and isn't a configured
  # `provider/model` is forwarded VERBATIM to this provider. Point it at
  # openrouter and every model it serves works with no per-model config and no
  # rebuild — adding a model is a runtime/data concern, not a code change.
  # default_provider: "openrouter"
  # Egress: default outbound path when an account/provider names none, and a
  # master kill-switch that forces every call `direct` regardless of bindings.
  # default_egress: "direct"
  # egress_enabled: true

# Named outbound network paths. An account (or provider) can route its upstream
# calls through a proxy so different accounts call "from different places" — e.g.
# two NVIDIA / OpenRouter accounts on separate egress IPs. This is network-path
# selection only (HTTP(S)/SOCKS5 proxy); `direct` (no proxy) is always implicit.
# Toggle one off with `enabled: false` and its users fall back to direct — no
# need to edit every account. The trace (GET /v1/traces) records the egress each
# attempt actually used. Prefer `url_env` for proxy creds over inline `url`.
# An egress may also carry a client identity: a custom User-Agent + headers
# applied to requests on that path (legitimate request metadata — e.g. an app
# id). This is NOT TLS/fingerprint impersonation of an official client; that is
# deliberately not implemented.
# egress:
#   - id: nvidia-proxy
#     kind: proxy
#     url_env: NVIDIA_PROXY_URL          # e.g. socks5://user:pass@host:1080
#     user_agent: "MyAgent/1.0"          # optional client identity for this path
#     headers:
#       x-app-id: "my-app"
#   - id: residential-eu
#     kind: proxy
#     url: "http://eu-gw.example:8080"
#     enabled: false                     # toggled off → users fall back to direct

# Optional encrypted credential vault. Secrets live in an age-encrypted file;
# the key lives in the OS keychain (or SWITCHBACK_VAULT_KEY for headless/CI).
#   switchback vault init                    # keychain key + empty vault file
#   switchback vault set openrouter_key      # value via --value or stdin
#   switchback vault keygen                  # mint a key for SWITCHBACK_VAULT_KEY
# An account may then reference a secret by name (auth.vault); it wins over
# env/inline. (Note: the path must be absolute — `~` is NOT expanded.)
# vault:
#   path: "/Users/you/.config/switchback/vault.age"
#   keychain_service: "switchback"

providers:
  # The mock adapter needs no credentials — it proves the pipeline end-to-end.
  - id: mock
    type: mock

  # Any OpenAI-compatible endpoint: OpenAI, OpenRouter, Ollama, vLLM, NIM, Groq, ...
  - id: openrouter
    type: openai_compatible
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"   # read from this env var; never written to logs
    # auth_scheme defaults to `bearer`. For an OpenAI-shaped endpoint that uses a
    # different scheme, declare it as data (no new adapter):
    #   auth_scheme: { kind: header, name: x-api-key }
    #   auth_scheme: { kind: query,  name: key }
    # selection: round_robin
    # sticky: 3
    # accounts:
    #   - id: vaulted              # most secure: pull the key from the vault
    #     auth: { kind: api_key, vault: openrouter_key }
    #     priority: 0
    #     policy_tags: ["prod"]
    #   - id: primary-api-key
    #     auth: { kind: api_key, env: OPENROUTER_API_KEY }
    #     priority: 1
    #     egress: nvidia-proxy       # this account exits via the named egress;
    #                                # another account can omit it and go direct
    #   - id: backup-oauth
    #     # Live refresh: with refresh_* + token_url the access token is minted/
    #     # refreshed automatically before each request (one refresh per account
    #     # even under concurrent load; rotated refresh tokens are followed). A
    #     # `token`/`token_env` is optional — refresh-only mints on first use.
    #     auth:
    #       kind: oauth
    #       refresh_env: OPENROUTER_OAUTH_REFRESH
    #       token_url: "https://oauth.example.com/token"
    #       client_id: "my-client-id"
    #       client_secret_env: OPENROUTER_OAUTH_CLIENT_SECRET
    #     priority: 2
    #     policy_tags: ["interactive"]

  - id: ollama
    type: openai_compatible
    base_url: "http://localhost:11434/v1"
    # no auth for local Ollama

  # Anthropic Messages API (/v1/messages) — its own wire format, not OpenAI.
  # base_url defaults to https://api.anthropic.com; auth is x-api-key.
  - id: anthropic
    type: anthropic
    api_key_env: "ANTHROPIC_API_KEY"   # read from env; never written to logs
    # base_url: "https://api.anthropic.com"   # default; override for a proxy

  # Google Gemini (GenerateContent) — x-goog-api-key auth, model in the URL path.
  - id: gemini
    type: gemini
    api_key_env: "GEMINI_API_KEY"
    # base_url: "https://generativelanguage.googleapis.com"   # default

  # Google Vertex AI — the Gemini wire on GCP's project endpoint, Bearer-token
  # auth (e.g. `gcloud auth print-access-token`). A codec + auth, no new adapter.
  - id: vertex
    type: vertex
    project: "my-gcp-project"
    region: "us-central1"
    api_key_env: "VERTEX_ACCESS_TOKEN"
    # base_url defaults to https://{region}-aiplatform.googleapis.com

routes:
  # A route matches inbound requests and defines an ordered candidate list.
  # A request's `model` field is "provider/model" (e.g. "mock/echo",
  # "openrouter/anthropic/claude-3.5-sonnet"); if it names a route, the
  # route's targets are used as the primary + fallback chain.
  - name: default
    match:
      model: "*"
    targets:
      - "mock/echo"
      # - "openrouter/openai/gpt-4o-mini"
      # - "ollama/qwen2.5-coder"

  - name: coding
    match:
      model: "coding"          # client can request model: "coding"
    require:
      streaming: true
    targets:
      # Direct Anthropic first, then cross-provider fallback (openrouter, ollama).
      - "anthropic/claude-3-5-sonnet-latest"
      - "openrouter/openai/gpt-4o"
      - "ollama/qwen2.5-coder"

# Optional typed catalog (§13.3 seams). Distinct provider/model/account/
# credential/price entities, each with a tenant scope (always 1 today) and
# FK-by-id references; price is a ledger with history. v1 carries + validates
# it (`switchback doctor`) — the hot path still runs off providers/routes above.
# catalog:
#   providers:
#     - { id: anthropic, name: Anthropic, api_kind: anthropic, base_url: "https://api.anthropic.com" }
#   models:
#     - { id: claude-3-5-sonnet-latest, provider_id: anthropic, context_window: 200000,
#         modalities: [text_in, text_out, vision_in] }
#   accounts:
#     - { id: anthropic-personal, provider_id: anthropic, owner_id: umut }
#   credentials:
#     - { id: cred-1, account_id: anthropic-personal, kind: api_key, source_ref: anthropic_key }
#   prices:   # micro-USD per million tokens; effective_from/to = ledger history
#     - { model_id: claude-3-5-sonnet-latest, token_kind: input,
#         unit_price_micros_per_mtok: 3000000, effective_from: "2025-01-01T00:00:00Z" }
