# cargo-deny configuration. Run `cargo deny check` locally; CI runs `cargo audit`
# for advisories. See https://embarkstudios.github.io/cargo-deny/

[advisories]
# Fail on security advisories; allow unmaintained as a warning.
yanked = "warn"
ignore = []

[licenses]
# Permissive licenses our dependency tree uses, plus our own (Elastic-2.0).
allow = [
    "Elastic-2.0",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "OpenSSL",
]
confidence-threshold = 0.9
# Our workspace crates are Elastic-2.0; don't flag them as deps.
private = { ignore = true }

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
